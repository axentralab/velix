services:
  - type: web
    name: velix-backend
    env: node
    plan: free
    root: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_EXPIRY
        sync: false
      - key: PORT
        sync: false
