services:
  - type: web
    runtime: node
    name: veloura-backend
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_EXPIRY
        value: 1d
      - key: MONGO_URI
        sync: false
      - key: ADMIN_EMAIL
        value: admin@veloura.com
      - key: PORT
        sync: false
